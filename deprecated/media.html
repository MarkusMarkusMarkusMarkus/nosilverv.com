<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #fff;

  font-family: 'Courier Prime', 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.8;
  min-height: 100vh;
  padding: 80px 32px 160px;

.year {
  font-size: 0.6rem;

}
.section-header {

  color: #999;
}
.entry {
  display: grid;
  grid-template-columns: 1fr 60px;
  gap: 16px;
  padding: 8px 0;
  border-bottom: 1px solid #eee;
}
.entry-name { font-size: 13px; }
.entry-name em { font-style: italic; }
.entry-name .dnf { color: #bbb; }
.entry-date { font-size: 13px; color: #999; text-align: right; }
.more {
  margin-top: 48px;
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #bbb;
}
.more a { color: #bbb; text-decoration: none; border-bottom: 1px solid #ddd; }
.more a:hover { color: #111; }
</style>
</head>
