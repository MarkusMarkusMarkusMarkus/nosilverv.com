<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f7;
      --text: #1a1a1a;
      --muted: #666;
      --border: #e0e0e0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 18px;
      line-height: 1.65;
      color: var(--text);
      background: var(--bg);
      max-width: 600px;
      margin: 0 auto;
      padding: 80px 24px 120px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 500;
      margin-bottom: 48px;
    }

    h2 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-top: 48px;
      margin-bottom: 16px;
    }

    p {
      margin-bottom: 1em;
    }

    a {
      color: var(--text);
    }

    .service {
      margin-bottom: 24px;
    }

    .service-name {
      font-weight: 500;
      margin-bottom: 4px;
    }

    .service-desc {
      color: var(--muted);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 32px 0;
    }

    .clients {
      color: var(--muted);
    }

    .cta {
      display: inline-block;
      margin-top: 48px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      padding: 12px 24px;
      background: var(--text);
      color: var(--bg);
      text-decoration: none;
    }

    .cta:hover {
      opacity: 0.85;
    }

    @media (max-width: 600px) {
      body {
        padding: 48px 20px 80px;
      }
    }
  </style>
</head>
<body>

  <h1>Consulting</h1>

  <h2>Services</h2>

  <div class="service">
    <div class="service-name">Single Session</div>
    <div class="service-desc">60-minute co-thinking call.</div>
  </div>

  <div class="service">
    <div class="service-name">Monthly Retainer</div>
    <div class="service-desc">Ongoing async co-thinking and editing. 1-2 60-minute calls/month possible.</div>
  </div>

  <h2>Select Clients</h2>

  <p class="clients">Chris Lakin · Moritz Bierling · Michael Stroe</p>

  <a href="https://twitter.com/nosilverv" class="cta">Get in touch</a>

</body>
</html>
