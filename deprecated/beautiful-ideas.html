<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beautiful Ideas — Nosilverv</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fff;
      color: #000;
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      padding: 0;
    }

    header {
      border-bottom: 4px solid #000;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .back {
      font-size: 0.75rem;
      color: #000;
      text-decoration: none;
      letter-spacing: 0.05em;
    }

    .back:hover {
      text-decoration: underline;
    }

    .site-tag {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: #888;
    }

    .title-block {
      border-bottom: 4px solid #000;
      padding: 40px 24px 32px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 15vw, 10rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
    }

    h1 span {
      display: block;
    }

    .subtitle-block {
      border-bottom: 4px solid #000;
      padding: 16px 24px;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
    }

    .ideas-list {
      list-style: none;
    }

    .ideas-list li {
      border-bottom: 2px solid #000;
    }

    .ideas-list li a {
      display: flex;
      align-items: baseline;
      gap: 20px;
      padding: 20px 24px;
      text-decoration: none;
      color: #000;
      transition: background 0.08s;
    }

    .ideas-list li a:hover {
      background: #000;
      color: #fff;
    }

    .num {
      font-size: 0.65rem;
      color: #aaa;
      min-width: 24px;
      transition: color 0.08s;
    }

    .ideas-list li a:hover .num {
      color: #666;
    }

    .idea-name {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .hero-block {
      border-top: 4px solid #000;
      padding: 32px 24px 24px;
    }

    .hero-block img {
      width: 100%;
      display: block;
      filter: grayscale(20%);
    }

    .hero-caption {
      margin-top: 12px;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
    }

    .invisible {
      color: #fff;
      font-size: 0.1px;
      user-select: none;
    }
  </style>
</head>
<body>

  <header>
    <a class="back" href="/">← NOSILVERV</a>
    <span class="site-tag">COLLECTION</span>
  </header>

  <div class="title-block">
    <h1>
      <span>BEAUTIFUL</span>
      <span>IDEAS</span>
    </h1>
  </div>

  <ul class="ideas-list">
    <li><a href="/beautiful-ideas/a-equals-a"><span class="num">01</span><span class="idea-name">A = A</span></a></li>
    <li><a href="/beautiful-ideas/insurance"><span class="num">02</span><span class="idea-name">Insurance</span></a></li>
    <li><a href="/beautiful-ideas/credible-conditional-commitments"><span class="num">03</span><span class="idea-name">Credible Conditional Commitments</span></a></li>
    <li><a href="/beautiful-ideas/loans"><span class="num">04</span><span class="idea-name">Loans</span></a></li>
    <li><a href="/beautiful-ideas/obe"><span class="num">05</span><span class="idea-name">OBE</span></a></li>
    <li><a href="/beautiful-ideas/obe"><span class="num">05</span><span class="idea-name">Gains from Trade</span></a></li>
    <li><a href="/beautiful-ideas/obe"><span class="num">05</span><span class="idea-name">The Felt Sense</span></a></li>
  </ul>

  <div class="hero-block">
    <p class="hero-caption">Beautiful ideas are everywhere.</p>
  </div>

  <p style="color: #faf9f7;">
    (TBD: Convert all essays into a book)<br>
    (TBD: Convert each essay into a video explainer)
  </p>

</body>
</html>
